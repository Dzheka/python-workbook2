<!DOCTYPE html>
<html>

<head>
    <title>Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    {% if error %}

    <h1>{{ error }}</h1>

    {% else %}

    <h1>{{ name }}</h1>

    <p>Score: {{ score }}</p>
    <p>Status: {{ status }}</p>

    {% endif %}

    <a href="/students">Back</a>

</body>

</html>
