<style>
    :root {
        --apple-green: #30d158;
        --glass-bg: rgba(255, 255, 255, 0.05);
    }

    body {
        background: #000;
        background-image: radial-gradient(at 0% 0%, rgba(48, 209, 88, 0.15) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(0, 122, 255, 0.1) 0px, transparent 50%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .liquid-card {
        background: var(--glass-bg);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 45px;
        padding: 4rem 3rem;
        max-width: 550px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
        font-weight: 700;
        font-size: 3.8rem;
        letter-spacing: -0.05em;
        margin-bottom: 1.5rem;
        line-height: 1.1;
    }

    .accent {
        color: var(--apple-green);
    }

    p {
        color: #86868b;
        font-size: 1.25rem;
        font-weight: 500;
        margin-bottom: 3rem;
    }

    .btn-stack {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
    }

    .btn-apple {
        background: #fff;
        color: #000;
        padding: 16px 50px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.1rem;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        width: 100%;
        max-width: 280px;
    }

    .btn-apple:hover {
        transform: scale(1.05);
        filter: brightness(0.9);
    }

    .btn-link {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        opacity: 0.7;
        transition: 0.3s;
    }

    .btn-link:hover {
        opacity: 1;
    }
</style>

<div class="container d-flex justify-content-center">
    <div class="liquid-card">
        <h1>Ahmad <span class="accent">Murtazoev</span></h1>
        <p>I'm a student at DII, currently crafting a Flask project experience.</p>
        <div class="btn-stack">
            <a href="/about" class="btn-apple">About Me</a>
            <a href="/students" class="btn-link">View Students →</a>
        </div>
    </div>
</div>
