<style>
    :root {
        --apple-green: #30d158;
    }

    body {
        background: #000;
        background-image: radial-gradient(circle at 50% 10%, rgba(48, 209, 88, 0.1) 0%, transparent 40%);
        color: #fff;
        font-family: -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .liquid-profile {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 50px;
        padding: 3.5rem;
        width: 100%;
        max-width: 480px;
        text-align: center;
    }

    .avatar-ring {
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, var(--apple-green), #007aff);
        border-radius: 35px;
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        font-weight: 800;
    }

    .name-heading {
        font-size: 2.2rem;
        font-weight: 700;
        margin-bottom: 2rem;
        letter-spacing: -1px;
    }

    .pill-stat {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 25px;
        padding: 1.2rem;
        margin-bottom: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .label {
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #86868b;
        letter-spacing: 1px;
        margin-bottom: 4px;
    }

    .value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--apple-green);
    }

    .btn-ios {
        background: var(--apple-green);
        color: #000;
        padding: 14px;
        border-radius: 20px;
        display: block;
        text-decoration: none;
        font-weight: 700;
        margin-top: 2rem;
    }
</style>

<div class="liquid-profile">
    <div class="avatar-ring">{{ name[0] }}</div>
    <h1 class="name-heading">{{ name }}</h1>
    <div class="pill-stat">
        <div class="label">Performance</div>
        <div class="value">{{ score }}%</div>
    </div>
    <div class="pill-stat">
        <div class="label">Classification</div>
        <div class="value" style="color: #fff">{{ result }}</div>
    </div>
    <a href="/students" class="btn-ios">View Leaderboard</a>
</div>
